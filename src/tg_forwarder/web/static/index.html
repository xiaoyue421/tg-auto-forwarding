  <head>

    <title>TG 转发控制台 — 请先构建前端</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.6;
      }
      code {
        background: #f3f4f6;
        padding: 0.15rem 0.4rem;
        border-radius: 0.25rem;
      }
      pre {
        background: #f9fafb;
        padding: 1rem;
        overflow-x: auto;
        border-radius: 0.375rem;
      }
    </style>

  <body>
    <h1>控制台静态资源尚未构建</h1>
    <p>请在项目根目录执行：</p>
    <pre><code>cd frontend
npm install
npm run build</code></pre>
    <p>
      构建完成后会写入 <code>src/tg_forwarder/web/static/</code>（含 <code>assets/</code>），然后重启 Web
      服务即可打开控制台。
    </p>
    <p>说明见 <code>frontend/README.md</code> 与仓库根目录 <code>README.md</code>。</p>
  </body>
